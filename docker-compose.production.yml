# Production-oriented compose (Postgres, healthchecks, replicas)
# Usage: docker compose -f docker-compose.production.yml up -d
# Requires: .env.production with POSTGRES_PASSWORD and other secrets

version: "3.9"

services:
  backend:
    build: ./backend
    env_file: ./backend/.env.production
    environment:
      NODE_ENV: production
    volumes:
      - backend-data:/var/lib/antislot/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      resources:
        limits: { memory: 512M }

  ai-server:
    build: ./server
    env_file: ./server/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://antislot:${POSTGRES_PASSWORD}@postgres:5432/antislot
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      resources:
        limits: { memory: 512M }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antislot
      POSTGRES_USER: antislot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antislot -d antislot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend-data:
  postgres-data:
