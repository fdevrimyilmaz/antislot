// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Force Gradle outputs into an ASCII-only folder only on local Windows builds.
def isWindowsHost = System.getProperty('os.name').toLowerCase().contains('windows')
def isEasBuild = System.getenv('EAS_BUILD') != null
if (isWindowsHost && !isEasBuild) {
  def asciiBuildRoot = new File(System.getenv('ANTISLOT_GRADLE_BUILD_DIR') ?: 'C:/antislot_gradle_build')
  gradle.beforeProject { project ->
    if (project.path == ':app') {
      project.layout.buildDirectory.set(new File(asciiBuildRoot, 'app'))
    }
  }
}

// RN 0.81 + Unicode Windows paths can fail during New Architecture native builds.
// Keep legacy architecture and disable library hard-fail checks for local builds.
gradle.projectsEvaluated {
  subprojects { subproject ->
    if (subproject.name in ['react-native-reanimated', 'react-native-worklets']) {
      subproject.tasks.matching { it.name == 'assertNewArchitectureEnabledTask' }.configureEach {
        enabled = false
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
