# Example nginx config for admin.antislot.app
# Purpose: protect therapy admin API routes with SSO + proxy shared secret.

upstream antislot_ai_server {
  server ai-server:3001;
}

upstream antislot_oauth2_proxy {
  server oauth2-proxy:4180;
}

server {
  listen 443 ssl http2;
  server_name admin.antislot.app;

  # Static admin page (admin.html + admin.js + styles.css)
  root /var/www/antislot-website;
  index admin.html;

  # Access sign-in endpoint (served by oauth2-proxy)
  location /oauth2/ {
    proxy_pass http://antislot_oauth2_proxy;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Auth subrequest endpoint
  location = /oauth2/auth {
    proxy_pass http://antislot_oauth2_proxy/oauth2/auth;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Original-URI $request_uri;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
  }

  # Admin API path exposed to browser client
  location /api/ {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

    proxy_set_header X-Admin-Proxy-Secret "<set-from-secret-manager>";
    proxy_set_header X-Auth-Request-Email $auth_email;
    proxy_set_header X-Auth-Request-Groups $auth_groups;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    proxy_pass http://antislot_ai_server/;
  }

  # Route admin page
  location = / {
    try_files /admin.html =404;
  }

  # Static files
  location / {
    try_files $uri =404;
  }
}

