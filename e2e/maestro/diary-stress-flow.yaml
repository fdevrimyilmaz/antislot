# Diary stress flow for real-device soak checks
appId: com.antislot.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
- tapOn:
    id: "home-card-diary"
- assertVisible:
    id: "diary-screen"
- tapOn:
    id: "diary-intro-secondary"
- repeat:
    times: 10
    commands:
      - tapOn:
          id: "diary-input"
      - eraseText
      - inputText: "Maestro stress note"
      - tapOn:
          id: "diary-save-btn"
      - tapOn:
          text: "Tamam"
- assertVisible:
    id: "diary-history"

