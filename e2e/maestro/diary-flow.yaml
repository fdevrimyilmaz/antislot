# Diary basic flow
appId: com.antislot.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
- tapOn:
    id: "home-card-diary"
- assertVisible:
    id: "diary-screen"
- tapOn:
    id: "diary-intro-secondary"
- tapOn:
    id: "diary-input"
- inputText: "Maestro diary note"
- tapOn:
    id: "diary-save-btn"
- tapOn:
    text: "Tamam"
- assertVisible:
    text: "Maestro diary note"

