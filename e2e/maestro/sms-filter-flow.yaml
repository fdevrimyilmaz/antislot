# SMS filter flow
appId: com.antislot.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
- tapOn:
    id: "home-card-sms-filter"
- assertVisible:
    id: "sms-filter-screen"
- tapOn:
    id: "sms-filter-test-message-input"
- inputText: "casino bonus bedava para"
- tapOn:
    id: "sms-filter-run-test-btn"
- assertVisible:
    id: "sms-filter-test-result"
