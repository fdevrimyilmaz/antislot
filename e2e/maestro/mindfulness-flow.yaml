# Mindfulness flow
appId: com.antislot.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000
- tapOn:
    id: "home-card-mindfulness"
- assertVisible:
    id: "mindfulness-screen"
- tapOn:
    id: "mindfulness-intro-start"
- tapOn:
    id: "mindfulness-session-action-breath-reset"
- assertVisible:
    id: "mindfulness-step-card"
- tapOn:
    id: "mindfulness-step-next-btn"
- assertVisible:
    id: "mindfulness-step-card"
