name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            server/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Check merge conflict markers
        run: npm run check:conflicts

      - name: Lint app
        run: npm run lint

      - name: Typecheck app
        run: npm run typecheck

      - name: Translation coverage report (strict + JSON)
        run: npm run i18n:report:strict:json:file

      - name: Upload translation coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: i18n-coverage-report
          path: reports/i18n-coverage.json
          if-no-files-found: error

      - name: Test app
        run: npm test -- --ci --passWithNoTests

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Typecheck backend
        run: npm run typecheck
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Install server dependencies (no optional native addons)
        run: npm ci --omit=optional
        working-directory: server

      - name: Typecheck server
        run: npm run typecheck
        working-directory: server

      - name: Test server
        run: npm test
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

  security-gate:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            server/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install server dependencies (no optional native addons)
        run: npm ci --omit=optional
        working-directory: server

      - name: Security gate (audit baseline)
        run: npm run security:gate

  iap-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.IAP_SMOKE_BASE_URL != '' && secrets.IAP_SMOKE_API_AUTH_TOKEN != '' && secrets.IAP_SMOKE_RECEIPT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run IAP Validate Smoke Test
        run: npm run smoke:iap
        working-directory: server
        env:
          IAP_SMOKE_BASE_URL: ${{ secrets.IAP_SMOKE_BASE_URL }}
          IAP_SMOKE_API_AUTH_TOKEN: ${{ secrets.IAP_SMOKE_API_AUTH_TOKEN }}
          IAP_SMOKE_RECEIPT: ${{ secrets.IAP_SMOKE_RECEIPT }}
          IAP_SMOKE_USER_ID: ${{ secrets.IAP_SMOKE_USER_ID }}
          IAP_SMOKE_PLATFORM: ${{ secrets.IAP_SMOKE_PLATFORM }}

  auth-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.AUTH_SMOKE_SERVER_BASE_URL != '' && secrets.AUTH_SMOKE_ID_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run Auth Validate Smoke Test
        run: npm run smoke:auth
        working-directory: server
        env:
          AUTH_SMOKE_SERVER_BASE_URL: ${{ secrets.AUTH_SMOKE_SERVER_BASE_URL }}
          AUTH_SMOKE_BACKEND_BASE_URL: ${{ secrets.AUTH_SMOKE_BACKEND_BASE_URL }}
          AUTH_SMOKE_ID_TOKEN: ${{ secrets.AUTH_SMOKE_ID_TOKEN }}
          AUTH_SMOKE_USER_ID: ${{ secrets.AUTH_SMOKE_USER_ID }}

  webhook-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.IAP_SMOKE_BASE_URL != '' && secrets.IAP_WEBHOOK_SECRET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run Webhook Smoke Test
        run: npm run smoke:webhook
        working-directory: server
        env:
          IAP_SMOKE_BASE_URL: ${{ secrets.IAP_SMOKE_BASE_URL }}
          IAP_WEBHOOK_SECRET: ${{ secrets.IAP_WEBHOOK_SECRET }}
          WEBHOOK_SMOKE_USER_ID: ${{ secrets.WEBHOOK_SMOKE_USER_ID }}

  load-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.LOAD_SMOKE_BASE_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run API Load Smoke Test
        run: npm run load:smoke
        working-directory: server
        env:
          LOAD_SMOKE_BASE_URL: ${{ secrets.LOAD_SMOKE_BASE_URL }}
          LOAD_SMOKE_API_AUTH_TOKEN: ${{ secrets.LOAD_SMOKE_API_AUTH_TOKEN }}
          LOAD_SMOKE_DURATION_SEC: ${{ secrets.LOAD_SMOKE_DURATION_SEC }}
          LOAD_SMOKE_CONCURRENCY: ${{ secrets.LOAD_SMOKE_CONCURRENCY }}
