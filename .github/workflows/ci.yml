name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            server/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Release preflight (strict, main branch)
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: npm run preflight:release
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORS_ALLOWLIST: ${{ secrets.CORS_ALLOWLIST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IAP_WEBHOOK_SECRET: ${{ secrets.IAP_WEBHOOK_SECRET }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          IAP_VALIDATOR_URL: ${{ secrets.IAP_VALIDATOR_URL }}
          IAP_IOS_SHARED_SECRET: ${{ secrets.IAP_IOS_SHARED_SECRET }}
          IAP_GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.IAP_GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          ADMIN_PROXY_AUTH_REQUIRED: ${{ secrets.ADMIN_PROXY_AUTH_REQUIRED }}
          ADMIN_PROXY_SHARED_SECRET: ${{ secrets.ADMIN_PROXY_SHARED_SECRET }}
          ADMIN_PROXY_ALLOWED_USERS: ${{ secrets.ADMIN_PROXY_ALLOWED_USERS }}
          ADMIN_PROXY_ALLOWED_GROUPS: ${{ secrets.ADMIN_PROXY_ALLOWED_GROUPS }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_BEARER_TOKEN: ${{ secrets.ALERT_WEBHOOK_BEARER_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Check merge conflict markers
        run: npm run check:conflicts

      - name: Lint app
        run: npm run lint

      - name: Typecheck app
        run: npm run typecheck

      - name: Translation coverage report (strict + JSON)
        run: npm run i18n:report:strict:json:file

      - name: Upload translation coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: i18n-coverage-report
          path: reports/i18n-coverage.json
          if-no-files-found: error

      - name: Test app (coverage gate)
        run: npm run test:coverage -- --ci --runInBand --passWithNoTests

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Typecheck backend
        run: npm run typecheck
        working-directory: backend

      - name: Test backend (coverage gate)
        run: npm run test:coverage -- --runInBand
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Install server dependencies (no optional native addons)
        run: npm ci --omit=optional
        working-directory: server

      - name: Typecheck server
        run: npm run typecheck
        working-directory: server

      - name: Test server (coverage gate)
        run: npm test -- --coverage --runInBand
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

  security-gate:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            server/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install server dependencies (no optional native addons)
        run: npm ci --omit=optional
        working-directory: server

      - name: Security gate (audit baseline)
        run: npm run security:gate

  iap-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.IAP_SMOKE_BASE_URL != '' && secrets.IAP_SMOKE_API_AUTH_TOKEN != '' && secrets.IAP_SMOKE_RECEIPT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run IAP Validate Smoke Test
        run: npm run smoke:iap
        working-directory: server
        env:
          IAP_SMOKE_BASE_URL: ${{ secrets.IAP_SMOKE_BASE_URL }}
          IAP_SMOKE_API_AUTH_TOKEN: ${{ secrets.IAP_SMOKE_API_AUTH_TOKEN }}
          IAP_SMOKE_RECEIPT: ${{ secrets.IAP_SMOKE_RECEIPT }}
          IAP_SMOKE_USER_ID: ${{ secrets.IAP_SMOKE_USER_ID }}
          IAP_SMOKE_PLATFORM: ${{ secrets.IAP_SMOKE_PLATFORM }}

  auth-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.AUTH_SMOKE_SERVER_BASE_URL != '' && secrets.AUTH_SMOKE_ID_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run Auth Validate Smoke Test
        run: npm run smoke:auth
        working-directory: server
        env:
          AUTH_SMOKE_SERVER_BASE_URL: ${{ secrets.AUTH_SMOKE_SERVER_BASE_URL }}
          AUTH_SMOKE_BACKEND_BASE_URL: ${{ secrets.AUTH_SMOKE_BACKEND_BASE_URL }}
          AUTH_SMOKE_ID_TOKEN: ${{ secrets.AUTH_SMOKE_ID_TOKEN }}
          AUTH_SMOKE_USER_ID: ${{ secrets.AUTH_SMOKE_USER_ID }}

  webhook-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.IAP_SMOKE_BASE_URL != '' && secrets.IAP_WEBHOOK_SECRET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run Webhook Smoke Test
        run: npm run smoke:webhook
        working-directory: server
        env:
          IAP_SMOKE_BASE_URL: ${{ secrets.IAP_SMOKE_BASE_URL }}
          IAP_WEBHOOK_SECRET: ${{ secrets.IAP_WEBHOOK_SECRET }}
          WEBHOOK_SMOKE_USER_ID: ${{ secrets.WEBHOOK_SMOKE_USER_ID }}

  load-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ github.event_name != 'pull_request' && secrets.LOAD_SMOKE_BASE_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies (smoke)
        run: npm ci --omit=optional
        working-directory: server

      - name: Run API Load Smoke Test
        run: npm run load:smoke
        working-directory: server
        env:
          LOAD_SMOKE_BASE_URL: ${{ secrets.LOAD_SMOKE_BASE_URL }}
          LOAD_SMOKE_API_AUTH_TOKEN: ${{ secrets.LOAD_SMOKE_API_AUTH_TOKEN }}
          LOAD_SMOKE_DURATION_SEC: ${{ secrets.LOAD_SMOKE_DURATION_SEC }}
          LOAD_SMOKE_CONCURRENCY: ${{ secrets.LOAD_SMOKE_CONCURRENCY }}

  maestro-critical:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: ${{ vars.MAESTRO_CI_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro critical flows
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          npm run e2e:maestro:critical
